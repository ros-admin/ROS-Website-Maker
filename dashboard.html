<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Admin Panel - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap');
    body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; }
    .ros-global-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(3, 10, 22, 0.95); display: none;
      flex-direction: column; align-items: center; justify-content: center; z-index: 99999;
    }
    .ros-spinner-container { position: relative; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; }
    .ros-dashed-spinner {
      position: absolute; width: 100%; height: 100%;
      border: 4px dashed #00b4d8; border-top-color: #ffd700; border-bottom-color: #ffd700;
      border-radius: 50%; animation: ros-spin 1.5s linear infinite;
    }
    .ros-spinner-logo { width: 65px; height: 65px; background: #ffffff; border-radius: 50%; padding: 3px; object-fit: cover; z-index: 2; }
    @keyframes ros-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-[#030a16] text-slate-100 min-h-screen flex flex-col">

  <div id="globalLoader" class="ros-global-loader">
    <div class="ros-spinner-container">
      <div class="ros-dashed-spinner"></div>
      <img src="https://rosociety.vercel.app/ros%20logo.png" alt="ROS Logo" class="ros-spinner-logo">
    </div>
    <p class="text-[#ffd700] text-sm mt-4">ডাটা লোড হচ্ছে...</p>
  </div>

  <header class="bg-slate-900 border-b border-slate-800 h-16 px-4 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <button onclick="toggleSidebar()" class="w-10 h-10 rounded-xl hover:bg-slate-800 flex items-center justify-center text-xl cursor-pointer transition-all text-[#00b4d8]">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="flex items-center gap-2">
        <img src="https://rosociety.vercel.app/ros%20logo.png" alt="Logo" class="w-8 h-8 object-cover">
        <span class="font-bold text-sm tracking-wide hidden sm:inline-block">ROS Admin Panel</span>
      </div>
    </div>

    <div class="relative">
      <button onclick="toggleProfileCard()" class="flex items-center gap-3 p-1.5 rounded-xl hover:bg-slate-800 transition-all cursor-pointer">
        <span id="topAdminName" class="text-xs font-bold text-slate-300 hidden sm:inline-block">লোড হচ্ছে...</span>
        <div class="w-9 h-9 rounded-full border border-[#00b4d8] p-0.5 bg-slate-950 overflow-hidden">
          <img id="topAdminAvatar" src="https://via.placeholder.com/150" alt="Avatar" class="w-full h-full object-cover rounded-full">
        </div>
      </button>

      <div id="profileDropdownCard" class="hidden absolute right-0 mt-3 w-72 bg-slate-950 border border-slate-800 rounded-2xl shadow-2xl p-5 z-50 flex flex-col items-center text-center">
        <div class="w-20 h-20 rounded-full border-2 border-[#ffd700] p-0.5 mb-3 bg-slate-900">
          <img id="popupAdminAvatar" src="https://via.placeholder.com/150" alt="Avatar" class="w-full h-full object-cover rounded-full">
        </div>
        <h4 id="popupAdminName" class="text-base font-bold text-white">Admin Name</h4>
        <p id="popupAdminRole" class="text-xs text-[#ffd700] font-bold mb-3">Role</p>
        
        <div class="w-full text-left bg-slate-900/50 rounded-xl p-3 border border-slate-800/60 text-xs space-y-2 mb-4">
          <div><span class="text-slate-500 font-semibold block">ইমেইল:</span><span id="popupAdminEmail" class="text-slate-300 font-mono">...</span></div>
          <div><span class="text-slate-500 font-semibold block">মোবাইল:</span><span id="popupAdminMobile" class="text-slate-300 font-mono">...</span></div>
        </div>

        <div class="w-full border-t border-slate-800/80 pt-3 mb-4 text-left">
          <span class="text-xs font-bold text-slate-400 block mb-1.5">সরাসরি পাসওয়ার্ড পরিবর্তন</span>
          <div class="space-y-2">
            <input type="password" id="profileNewPass" class="w-full px-3 py-1.5 bg-slate-900 border border-slate-800 rounded-lg text-xs text-white focus:outline-none focus:border-[#00b4d8]" placeholder="নতুন পাসওয়ার্ড দিন">
            <button onclick="changeProfilePasswordDirectly()" class="w-full py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg text-xs transition-all cursor-pointer">পাসওয়ার্ড আপডেট করুন</button>
          </div>
        </div>

        <button onclick="handleLogout()" class="w-full py-2 bg-rose-600/10 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-500/20 text-xs font-bold rounded-xl transition-all cursor-pointer">
          <i class="fa-solid fa-right-from-bracket mr-1"></i> লগআউট করুন
        </button>
      </div>
    </div>
  </header>

  <div class="flex flex-1 relative overflow-hidden">
    
    <aside id="sidebarMenu" class="hidden w-64 bg-slate-900/90 border-r border-slate-800 p-5 flex-col shrink-0 absolute left-0 top-0 h-full z-30 backdrop-blur-xl transition-all duration-300 shadow-2xl">
      <div class="space-y-4 w-full">
        <div class="text-xs font-bold uppercase text-slate-500 tracking-wider mb-2">প্যানেল মেনু</div>
        <nav class="space-y-1">
          <button onclick="switchTab('main_dashboard')" id="btn-main_dashboard" class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl text-slate-400 hover:bg-slate-800/50 hover:text-white text-left cursor-pointer">
            <i class="fa-solid fa-chart-pie"></i> Main Dashboard
          </button>
          <button onclick="switchTab('member_management')" id="btn-member_management" class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl text-slate-400 hover:bg-slate-800/50 hover:text-white text-left cursor-pointer">
            <i class="fa-solid fa-users"></i> Member Management
          </button>
        </nav>
      </div>
    </aside>

    <main class="flex-1 p-4 sm:p-6 overflow-y-auto">
      
      <section id="main_dashboard-section" class="space-y-8">
        </section>

      <section id="member_management-section" class="hidden space-y-6">
        </section>

    </main>
  </div>

  <div id="detailsModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center z-50 p-4">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
      <div class="px-6 py-4 bg-slate-950 border-b border-slate-800 flex items-center justify-between">
        <h3 class="text-sm font-bold text-white flex items-center gap-2">
          <i class="fa-solid fa-id-card text-[#00b4d8]"></i> সদস্যের বিস্তারিত প্রোফাইল তথ্য
        </h3>
        <button onclick="closeDetailsModal()" class="text-slate-400 hover:text-white cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="modalContentArea" class="p-6 overflow-y-auto text-xs text-slate-300 space-y-4"></div>
      <div class="px-6 py-4 bg-slate-950/40 border-t border-slate-800 flex justify-end gap-2">
        <button onclick="downloadSingleUserPDF()" class="px-4 py-2 bg-gradient-to-r from-red-600 to-rose-600 text-white font-bold text-xs rounded-xl flex items-center gap-1.5 cursor-pointer">
          <i class="fa-solid fa-file-arrow-down"></i> পিডিএফ ডাউনলোড
        </button>
        <button onclick="closeDetailsModal()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded-xl cursor-pointer">বন্ধ করুন</button>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbydDnzGu74vb1c8QQK54VBXj64aHtq1XpL2c9Bov0LB1Eq99EOwa8HJILUFybnc2siuRg/exec";
    let currentAdmin = null;
    let allUsersData = [];

    window.addEventListener('DOMContentLoaded', async () => {
      const stored = sessionStorage.getItem('currentAdmin');
      if (!stored) { window.location.href = 'index.html'; return; }
      currentAdmin = JSON.parse(stored);
      
      setupAdminProfile();
      
      // ডাইনামিক ভিউ মডিউল লোড করা
      if (typeof initMainDashboardHTML === 'function') initMainDashboardHTML();
      if (typeof initMemberManagementHTML === 'function') initMemberManagementHTML();
      
      await fetchDashboardData();
      switchTab('main_dashboard'); // ডিফল্ট হোম পেজ চালু করা
    });

    function setupAdminProfile() {
      document.getElementById('topAdminName').innerText = currentAdmin.englishName || currentAdmin.username;
      document.getElementById('popupAdminName').innerText = currentAdmin.englishName || currentAdmin.username;
      document.getElementById('popupAdminRole').innerText = currentAdmin.role === 'super_admin' ? 'Super Admin 👑' : 'General Admin 🛠';
      document.getElementById('popupAdminEmail').innerText = currentAdmin.email;
      document.getElementById('popupAdminMobile').innerText = currentAdmin.mobile || 'N/A';
      if (currentAdmin.photoUrl) {
        document.getElementById('topAdminAvatar').src = currentAdmin.photoUrl;
        document.getElementById('popupAdminAvatar').src = currentAdmin.photoUrl;
      }
    }

    async function fetchDashboardData() {
      document.getElementById('globalLoader').style.display = 'flex';
      try {
        const r = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ action: "getUsersData" })
        });
        const res = await r.json();
        document.getElementById('globalLoader').style.display = 'none';

        if (res.success && res.data && res.data.length > 0) {
          allUsersData = res.data;
          triggerModulesUpdate();
        } else { generateMockData(); }
      } catch (e) {
        document.getElementById('globalLoader').style.display = 'none';
        generateMockData();
      }
    }

    function triggerModulesUpdate() {
      if (typeof renderDashboardCharts === 'function') renderDashboardCharts(allUsersData);
      if (typeof setupRegistrationDateFilter === 'function') setupRegistrationDateFilter(allUsersData);
      if (typeof filterAndRenderMembersTable === 'function') filterAndRenderMembersTable();
    }

    function generateMockData() {
      const thisYear = new Date().getFullYear();
      allUsersData = [
        { memberId: "ROS-26-001", englishName: "Utsab Sarkar", mobile: "01712345678", email: "utsab@gmail.com", bloodGroup: "A+", gender: "Male", registrationDate: `${thisYear}-07-10 10:00:00`, status: "approved" },
        { memberId: "ROS-26-002", englishName: "Nusrat Jahan", mobile: "01911223344", email: "nusrat@gmail.com", bloodGroup: "O+", gender: "Female", registrationDate: `${thisYear}-07-09 11:00:00`, status: "pending" }
      ];
      triggerModulesUpdate();
    }

    // ওটিপি (OTP) বিহীন সরাসরি পাসওয়ার্ড চেঞ্জ ইঞ্জিন
    async function changeProfilePasswordDirectly() {
      const newPass = document.getElementById('profileNewPass').value;
      if (!newPass || newPass.length < 6) { alert("পাসওয়ার্ড কমপক্ষে ৬ ডিজিট হতে হবে।"); return; }
      
      document.getElementById('globalLoader').style.display = 'flex';
      try {
        const r = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ 
            action: "resetAdminPassword", 
            username: currentAdmin.username, 
            otp: "DIRECT", // ওটিপি বাইপাস টোকেন
            newPassword: newPass 
          })
        });
        const res = await r.json();
        document.getElementById('globalLoader').style.display = 'none';
        if (res.success) {
          alert("পাসওয়ার্ড সরাসরি সফলভাবে আপডেট করা হয়েছে!");
          document.getElementById('profileNewPass').value = '';
          toggleProfileCard();
        } else { alert(res.error); }
      } catch (e) { 
        document.getElementById('globalLoader').style.display = 'none'; 
        alert("সার্ভার কানেকশন ত্রুটি!");
      }
    }

    function switchTab(tabId) {
      document.getElementById('main_dashboard-section').classList.add('hidden');
      document.getElementById('member_management-section').classList.add('hidden');

      const tabs = ['main_dashboard', 'member_management'];
      tabs.forEach(id => {
        const btn = document.getElementById(`btn-${id}`);
        if(btn) btn.className = "w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl text-slate-400 hover:bg-slate-800/50 hover:text-white text-left cursor-pointer";
      });

      document.getElementById(`${tabId}-section`).classList.remove('hidden');
      const activeBtn = document.getElementById(`btn-${tabId}`);
      if(activeBtn) activeBtn.className = "w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl bg-[#00b4d8]/10 text-[#00b4d8] border border-[#00b4d8]/20 text-left cursor-pointer";

      document.getElementById('sidebarMenu').classList.add('hidden');
    }

    function viewMembersWithFilter(status) {
      switchTab('member_management');
      const selectFilter = document.getElementById('filterStatus');
      if (selectFilter) {
        selectFilter.value = status;
        if (typeof filterAndRenderMembersTable === 'function') filterAndRenderMembersTable();
      }
    }

    function toggleSidebar() { document.getElementById('sidebarMenu').classList.toggle('hidden'); }
    function toggleProfileCard() { document.getElementById('profileDropdownCard').classList.toggle('hidden'); }
    function handleLogout() { sessionStorage.clear(); window.location.href = 'index.html'; }
  </script>

  <script src="main-dashboard.js"></script>
  <script src="member-management.js"></script>
</body>
</html>
