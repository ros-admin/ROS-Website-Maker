<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>লগইন - রাজশাহী অলিম্পিয়াড সোসাইটি</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --dark-bg: #030a16;          
      --panel-bg: #051226;         
      --secondary: #00a4cc;        
      --accent: #ffd700;           
      --text-light: #f1f5f9;
      --text-muted: #52667d;       
      --input-border: #003049;     
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--dark-bg);
      color: var(--text-light);
      font-family: 'Poppins', 'Hind Siliguri', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--panel-bg);
      width: 100%;
      max-width: 420px;
      padding: 40px 30px;
      border-radius: 12px;
      border: 1px solid rgba(0, 164, 204, 0.1);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .logo-area img {
      width: 80px;
      margin-bottom: 15px;
    }

    .login-container h2 {
      font-size: 24px;
      color: #fff;
      margin-bottom: 8px;
    }

    .login-container p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 30px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      transition: 0.3s;
    }

    .input-group input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      background: var(--dark-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: 0.3s ease;
    }

    .input-group input:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 8px rgba(0, 164, 204, 0.2);
    }

    .input-group input:focus + i {
      color: var(--secondary);
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      left: auto !important;
      cursor: pointer;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 25px;
    }

    .forgot-pass {
      color: var(--secondary);
      text-decoration: none;
      transition: 0.3s;
    }

    .forgot-pass:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--secondary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 164, 204, 0.3);
    }

    .btn-login:hover {
      background: #008db0;
      box-shadow: 0 6px 20px rgba(0, 164, 204, 0.5);
    }

    .register-link {
      margin-top: 25px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .register-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-area">
      <img src="https://rosociety.vercel.app/ros%20logo.png" alt="ROS Logo">
    </div>
    <h2>স্বাগতম!</h2>
    <p>আপনার অ্যাকাউন্ট লগইন করুন</p>

    <form id="loginForm">
      <div class="input-group">
        <input type="email" id="email" placeholder="ইমেইল অ্যাড্রেস" required autocomplete="username">
        <i class="fas fa-envelope"></i>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="পাসওয়ার্ড" required autocomplete="current-password">
        <i class="fas fa-lock"></i>
        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
      </div>

      <div class="form-options">
        <label style="color: var(--text-muted); display: flex; align-items: center; gap: 5px; cursor: pointer;">
          <input type="checkbox" id="rememberMe"> মনে রাখুন
        </label>
        <a href="../ForgotPassword/" class="forgot-pass">পাসওয়ার্ড ভুলে গেছেন?</a>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">লগইন করুন</button>
    </form>

    <div class="register-link">
      অ্যাকাউন্ট নেই? <a href="../Registration/">এখানে নিবন্ধন করুন</a>
    </div>
  </div>

  <div id="rosAlertModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(3,10,22,0.85); display:none; align-items:center; justify-content:center; z-index:99999; padding:20px; box-sizing:border-box;">
    <div style="background:#051226; width:100%; max-width:400px; padding:30px 20px; border-radius:10px; border:1px solid rgba(0,164,204,0.2); box-shadow:0 15px 35px rgba(0,0,0,0.5); text-align:center; position:relative;">
      <button id="closeAlertBtn" style="position:absolute; top:12px; right:15px; background:none; border:none; color:#52667d; font-size:18px; cursor:pointer;"><i class="fas fa-times"></i></button>
      <div id="alertIcon" style="font-size:45px; margin-bottom:15px;"></div>
      <h3 id="alertTitle" style="color:#fff; font-size:18px; margin-bottom:10px;"></h3>
      <p id="alertMessage" style="color:#94a3b8; font-size:14px; line-height:1.5; margin-bottom:20px;"></p>
      <button id="alertActionBtn" style="width:100%; padding:12px; background:#00a4cc; color:#fff; border:none; border-radius:6px; font-weight:600; cursor:pointer; transition:0.3s;">ঠিক আছে</button>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
