<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROS Admin Panel - Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900/80 backdrop-blur-md border border-slate-800 rounded-2xl shadow-2xl p-6 text-slate-100">
        
        <!-- Branding Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-sky-500/10 text-sky-400 mb-3 border border-sky-500/20 shadow-lg shadow-sky-500/10">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold tracking-wide">ROS অ্যাডমিন প্যানেল</h2>
            <p class="text-sm text-slate-400 mt-1">দয়া করে আপনার অ্যাকাউন্ট ভেরিফাই করুন</p>
        </div>

        <!-- নোটিফিকেশন মেসেজ অ্যালার্ট -->
        <div id="alertBox" class="hidden mb-4 p-3 rounded-lg text-sm flex items-start space-x-2 border animate-pulse">
            <i id="alertIcon" class="mt-0.5"></i>
            <span id="alertMessage"></span>
        </div>

        <!-- ========================================== -->
        <!-- ১. লগইন ফর্ম (Login Form) -->
        <!-- ========================================== -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">ইউজারনেম (Username)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="loginUsername" required 
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-sky-500 text-slate-100 placeholder-slate-600 transition"
                        placeholder="e.g. rosadmin">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-sm font-medium text-slate-300">পাসওয়ার্ড (Password)</label>
                    <button type="button" onclick="switchView('forgotView')" class="text-xs text-sky-400 hover:underline transition">Forgot Password?</button>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="loginPassword" required 
                        class="w-full pl-10 pr-10 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-sky-500 text-slate-100 placeholder-slate-600 transition"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePasswordVisibility('loginPassword', this)" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-slate-300">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full py-3 bg-sky-600 hover:bg-sky-500 active:bg-sky-700 text-white font-medium rounded-xl transition shadow-lg shadow-sky-600/20 flex items-center justify-center space-x-2">
                <span>লগইন করুন</span>
                <i class="fa-solid fa-arrow-right-to-bracket text-sm"></i>
            </button>
        </form>

        <!-- ========================================== -->
        <!-- ২. ওটিপি রিকোয়েস্ট ফর্ম (Forgot Password View) -->
        <!-- ========================================== -->
        <div id="forgotView" class="hidden space-y-5">
            <p class="text-xs text-slate-400 bg-slate-950 p-3 rounded-lg border border-slate-800/60 leading-relaxed">
                <i class="fa-solid fa-circle-info text-sky-400 mr-1"></i> আপনার ইউজারনেমটি দিন। শিটে যুক্ত থাকা অ্যাডমিন ইমেইলে একটি ৬-ডিজিটের ওটিপি কোড পাঠানো হবে।
            </p>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">ইউজারনেম নিশ্চিত করুন</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-user-tag"></i>
                    </span>
                    <input type="text" id="forgotUsername" 
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-sky-500 text-slate-100 placeholder-slate-600 transition"
                        placeholder="পাসওয়ার্ড ভুলে যাওয়া অ্যাডমিন ইউজারনেম">
                </div>
            </div>

            <div class="flex items-center space-x-3 pt-2">
                <button type="button" onclick="switchView('loginForm')" class="w-1/3 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-sm transition">ফিরে যান</button>
                <button type="button" onclick="requestOtp()" id="otpBtn" class="w-2/3 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-xl transition flex items-center justify-center space-x-2">
                    <span>OTP পাঠান</span>
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- ৩. ওটিপি ভেরিফাই ও পাসওয়ার্ড রিসেট ফর্ম -->
        <!-- ========================================== -->
        <div id="resetView" class="hidden space-y-5">
            <div class="p-3 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs rounded-xl flex items-center space-x-2">
                <i class="fa-solid fa-envelope-circle-check text-base"></i>
                <span>আপনার রেজিস্টার্ড ইমেইলে ওটিপি পাঠানো হয়েছে।</span>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">৬-ডিজিটের ওটিপি (OTP Code)</label>
                <input type="text" id="resetOtp" maxlength="6"
                    class="w-full tracking-widest text-center py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-emerald-500 text-slate-100 font-mono text-xl placeholder-slate-800"
                    placeholder="000000">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">নতুন পাসওয়ার্ড (New Password)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="password" id="resetNewPassword" 
                        class="w-full pl-10 pr-10 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-emerald-500 text-slate-100 placeholder-slate-600 transition"
                        placeholder="নূন্যতম ৬ অক্ষরের পাসওয়ার্ড">
                    <button type="button" onclick="togglePasswordVisibility('resetNewPassword', this)" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-slate-300">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center space-x-3 pt-2">
                <button type="button" onclick="switchView('forgotView')" class="w-1/3 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-sm transition">পিছনে যান</button>
                <button type="button" onclick="resetPassword()" id="resetBtn" class="w-2/3 py-2.5 bg-sky-600 hover:bg-sky-500 text-white text-sm font-medium rounded-xl transition flex items-center justify-center space-x-2">
                    <span>পাসওয়ার্ড আপডেট করুন</span>
                    <i class="fa-solid fa-circle-check text-xs"></i>
                </button>
            </div>
        </div>

    </div>

    <!-- ========================================== -->
    <!-- জাভাস্ক্রিপ্ট লজিক এবং ব্যাকএন্ড কানেক্টিভিটি -->
    <!-- ========================================== -->
    <script>
        // ⚠️ আপনার গুগল অ্যাপস স্ক্রিপ্ট ডিপ্লয় করার পর পাওয়া WEB APP URL টি এখানে বসান
        const WEB_APP_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

        // ইন্টারফেস ভিউ পরিবর্তন করার ইঞ্জিন
        function switchView(viewId) {
            hideAlert();
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('forgotView').classList.add('hidden');
            document.getElementById('resetView').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        }

        // পাসওয়ার্ড দেখা/লুকানোর টগল ফাংশন
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.className = "fa-solid fa-eye-slash";
            } else {
                input.type = "password";
                icon.className = "fa-solid fa-eye";
            }
        }

        // অ্যালার্ট বা মেসেজ দেখানোর ফাংশন
        function showAlert(message, type = "error") {
            const box = document.getElementById('alertBox');
            const icon = document.getElementById('alertIcon');
            const msg = document.getElementById('alertMessage');
            
            box.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/20', 'text-red-400', 'bg-emerald-500/10', 'border-emerald-500/20', 'text-emerald-400');
            
            if (type === "success") {
                box.classList.add('bg-emerald-500/10', 'border-emerald-500/20', 'text-emerald-400');
                icon.className = "fa-solid fa-circle-check";
            } else {
                box.classList.add('bg-red-500/10', 'border-red-500/20', 'text-red-400');
                icon.className = "fa-solid fa-triangle-exclamation";
            }
            msg.innerText = message;
        }

        function hideAlert() {
            document.getElementById('alertBox').classList.add('hidden');
        }

        // বাটন লোডিং স্টেট টগল
        function setBtnLoading(btnId, isSubmitBtn, text, disabled) {
            const btn = document.getElementById(btnId);
            btn.disabled = disabled;
            if (isSubmitBtn) {
                btn.innerHTML = disabled ? `<span>${text}...</span> <i class="fa-solid fa-spinner animate-spin"></i>` : `<span>${text}</span> <i class="fa-solid fa-arrow-right-to-bracket text-sm"></i>`;
            } else {
                btn.innerHTML = disabled ? `<span>${text}...</span> <i class="fa-solid fa-spinner animate-spin"></i>` : `<span>${text}</span>`;
            }
        }

        // --- অ্যাকশন ১: অ্যাডমিন লগইন রিকোয়েস্ট ---
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideAlert();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const submitBtn = this.querySelector('button[type="submit"]');

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>প্রসেস হচ্ছে...</span> <i class="fa-solid fa-spinner animate-spin"></i>`;

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // গুগল অ্যাপস স্ক্রিপ্ট রিডাইরেক্ট ম্যানেজমেন্টের জন্য নিরাপদ
                    body: JSON.stringify({
                        action: "adminLogin",
                        username: username,
                        password: password
                    })
                });

                // নো-কোর্স মোডে সরাসরি রেসপন্স ডাটা পড়া যায় না, তাই আমরা সাকসেস মেসেজ ও রিডাইরেকশন 
                // হ্যান্ডেল করার জন্য মেকানিজম বা সাধারণ ফেচ ব্যবহার করতে পারি। 
                // যদি অ্যাপস স্ক্রিপ্টে doOptions এবং স্ট্যান্ডার্ড JSON রিটার্ন সেট করা থাকে, সাধারণ ফেচ কাজ করবে:
                
                // স্ট্যান্ডার্ড মোড ট্রাই (যদি CORS এলাউড থাকে)
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "adminLogin", username: username, password: password })
                });
                const result = await res.json();
                
                if (result.success) {
                    showAlert("লগইন সফল হয়েছে! ড্যাশবোর্ডে নিয়ে যাওয়া হচ্ছে...", "success");
                    localStorage.setItem('ros_admin', JSON.stringify(result.adminData));
                    setTimeout(() => {
                        window.location.href = "dashboard.html"; // আপনার ড্যাশবোর্ড পেজের লিংক
                    }, 1500);
                } else {
                    showAlert(result.error || "লগইন ব্যর্থ হয়েছে!");
                }

            } catch (err) {
                // নেটওয়ার্ক ফেইলুর অথবা নো-কোর্স এরর ক্যাচিং
                showAlert("সার্ভার রেসপন্স করেনি অথবা নেটওয়ার্ক সমস্যা! অনুগ্রহ করে আপনার WEB_APP_URL বা শিটের ডাটা পুনরায় পরীক্ষা করুন।");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>লগইন করুন</span> <i class="fa-solid fa-arrow-right-to-bracket text-sm"></i>`;
            }
        });

        // --- অ্যাকশন ২: ওটিপি কোড রিকোয়েস্ট (Forgot Password) ---
        async function requestOtp() {
            hideAlert();
            const username = document.getElementById('forgotUsername').value.trim();
            if(!username) return showAlert("দয়া করে ইউজারনেমটি লিখুন!");

            setBtnLoading('otpBtn', false, 'কোড পাঠানো হচ্ছে', true);

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "sendAdminResetOtp", username: username })
                });
                const result = await res.json();

                if(result.success) {
                    switchView('resetView');
                } else {
                    showAlert(result.error);
                }
            } catch (err) {
                showAlert("ওটিপি রিকোয়েস্ট ব্যর্থ হয়েছে!");
            } finally {
                setBtnLoading('otpBtn', false, 'OTP পাঠান', false);
            }
        }

        // --- অ্যাকশন ৩: পাসওয়ার্ড রিসেট নিশ্চিতকরণ ---
        async function resetPassword() {
            hideAlert();
            const username = document.getElementById('forgotUsername').value.trim();
            const otp = document.getElementById('resetOtp').value.trim();
            const newPassword = document.getElementById('resetNewPassword').value;

            if(!otp || !newPassword) return showAlert("সবগুলো ফিল্ড সঠিকভাবে পূরণ করুন!");
            if(newPassword.length < 6) return showAlert("নতুন পাসওয়ার্ড নূন্যতম ৬ অক্ষরের হতে হবে!");

            setBtnLoading('resetBtn', false, 'আপডেট হচ্ছে', true);

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "resetAdminPassword",
                        username: username,
                        otp: otp,
                        newPassword: newPassword
                    })
                });
                const result = await res.json();

                if(result.success) {
                    showAlert("পাসওয়ার্ড সফলভাবে পরিবর্তিত হয়েছে! নতুন পাসওয়ার্ড দিয়ে লগইন করুন।", "success");
                    setTimeout(() => {
                        document.getElementById('loginUsername').value = username;
                        switchView('loginForm');
                    }, 2500);
                } else {
                    showAlert(result.error);
                }
            } catch (err) {
                showAlert("পাসওয়ার্ড রিসেট প্রসেস ব্যর্থ হয়েছে!");
            } finally {
                setBtnLoading('resetBtn', false, 'পাসওয়ার্ড আপডেট করুন', false);
            }
        }
    </script>
</body>
</html>
